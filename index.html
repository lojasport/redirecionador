<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Exclusivo | Grupo VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Slideshow com as suas 7 fotos */
        .bg-slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: fadeSlide 28s infinite;
        }

        /* Mapeamento das suas fotos enviadas */
        .slide:nth-child(1) {
            background-image: url('1.jpeg');
            animation-delay: 0s;
        }

        .slide:nth-child(2) {
            background-image: url('2.jpeg');
            animation-delay: 4s;
        }

        .slide:nth-child(3) {
            background-image: url('3.jpeg');
            animation-delay: 8s;
        }

        .slide:nth-child(4) {
            background-image: url('4.jpeg');
            animation-delay: 12s;
        }

        .slide:nth-child(5) {
            background-image: url('5.jpeg');
            animation-delay: 16s;
        }

        .slide:nth-child(6) {
            background-image: url('6.jpg');
            animation-delay: 20s;
        }

        .slide:nth-child(7) {
            background-image: url('7.jpg');
            animation-delay: 24s;
        }

        @keyframes fadeSlide {

            0%,
            100% {
                opacity: 0;
            }

            5%,
            14% {
                opacity: 1;
            }

            19% {
                opacity: 0;
            }
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.4) 100%);
            z-index: -1;
        }

        .container {
            text-align: center;
            padding: 30px 20px;
            max-width: 400px;
            width: 90%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        /* Contador de 60 segundos */
        .timer-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 25px;
            border: 2px solid #ff4d4d;
        }

        #countdown {
            font-size: 3rem;
            font-weight: 800;
            font-family: monospace;
            color: #fff;
        }

        .urgency-blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0.5;
                color: #ff0000;
            }
        }

        /* Botão com transição de cor */
        .btn-pulsar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #25d366;
            color: white;
            padding: 22px;
            font-size: 1.3rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 18px;
            transition: background-color 0.5s ease;
            animation: pulsar 1.5s infinite;
        }

        .btn-danger {
            background-color: #ff3333 !important;
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.6);
        }

        @keyframes pulsar {
            0% {
                transform: scale(1);
            }

            70% {
                transform: scale(1.03);
            }

            100% {
                transform: scale(1);
            }
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
        }

        /* Contador de visualizadores */
        .viewer-counter {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            padding: 7px 16px;
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 18px;
        }

        .viewer-dot {
            width: 9px;
            height: 9px;
            background: #22c55e;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 6px #22c55e;
            animation: pulso-dot 1.4s ease-in-out infinite;
        }

        @keyframes pulso-dot {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 6px #22c55e;
            }

            50% {
                opacity: 0.5;
                box-shadow: 0 0 14px #22c55e;
            }
        }

        /* Pop-up Notificação */
        #notification-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            pointer-events: none;
        }

        .notification {
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            border-left: 4px solid #25d366;
            margin-bottom: 10px;
            font-size: 0.85rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(5px);
            animation: slideInUp 0.5s ease-out forwards, fadeOut 0.5s ease-in forwards 4.5s;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        .notification-name {
            font-weight: bold;
            color: #25d366;
        }
    </style>
</head>

<body>

    <div class="bg-slideshow">
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
    </div>
    <div class="bg-overlay"></div>

    <div class="container">
        <h1 style="font-size: 1.8rem; margin-bottom: 10px;">ÚLTIMAS VAGAS🔥</h1>

        <div class="timer-box">
            <div style="font-size: 0.8rem; color: #ff4d4d; font-weight: bold;">EXPIRA EM:</div>
            <div id="countdown">03:00</div>
        </div>

        <p style="margin-bottom: 25px;">Não perca a chance de entrar no grupo e ter acesso a conteúdos exclusivos.
            O convite será invalidado quando o cronômetro zerar.</p>

        <div class="viewer-counter">
            <span class="viewer-dot"></span>
            <span id="viewer-count">384</span>&nbsp;pessoas visualizando este convite
        </div>

        <a href="https://t.me/julliana_bonde_bot" class="btn-pulsar" id="action-btn">
            <i class="fab fa-whatsapp"></i>
            ENTRAR NO GRUPO
        </a>

        <div class="footer-text">© 2026 • Acesso Privado e Seguro</div>
    </div>

    <!-- Container de Notificações -->
    <div id="notification-container"></div>

    <script>
        function startTimer(duration, display, btn) {
            let timer = duration, minutes, seconds;
            let interval = setInterval(function () {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                display.textContent = minutes + ":" + seconds;

                // Alerta visual aos 30 segundos
                if (timer <= 30) {
                    display.classList.add('urgency-blink');
                }

                // Botão muda para vermelho aos 15 segundos
                if (timer <= 15) {
                    btn.classList.add('btn-danger');
                    btn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ENTRAR AGORA!';
                }

                if (--timer < 0) {
                    clearInterval(interval);
                    display.textContent = "00:00";
                    btn.style.opacity = "0.5";
                    btn.style.pointerEvents = "none";
                    btn.innerText = "CONVITE EXPIRADO";
                }
            }, 1000);
        }

        window.onload = function () {
            let threeMinutes = 180;
            let display = document.querySelector('#countdown');
            let btn = document.querySelector('#action-btn');
            startTimer(threeMinutes, display, btn);

            // Contador de visualizadores fluctuante
            let viewerEl = document.getElementById('viewer-count');
            let baseCount = 370 + Math.floor(Math.random() * 30);
            viewerEl.textContent = baseCount;
            setInterval(function () {
                let delta = Math.floor(Math.random() * 5) - 2;
                baseCount = Math.max(340, Math.min(430, baseCount + delta));
                viewerEl.textContent = baseCount;
            }, 3000);

            // Pop-up de novas entradas (apenas masculinos com sobrenome)
            const maleNames = ["Gabriel", "Lucas", "Mateus", "João", "Pedro", "Felipe", "Rodrigo", "André", "Bruno", "Daniel", "Carlos", "Renato", "Vitor", "Marcos", "Eduardo", "Gustavo", "Fernando", "Ricardo", "Paulo", "Thiago", "Diego", "Alexandre", "Leonardo", "Marcelo", "Vinícius"];
            const maleSurnames = ["Silva", "Santos", "Oliveira", "Souza", "Rodrigues", "Ferreira", "Alves", "Pereira", "Lima", "Gomes", "Costa", "Ribeiro", "Martins", "Carvalho", "Almeida", "Lopes", "Soares", "Fernandes", "Vieira", "Barbosa", "Rocha", "Dias", "Nascimento", "Moreira", "Andrade"];

            function showJoinNotification() {
                const name = maleNames[Math.floor(Math.random() * maleNames.length)];
                const surname = maleSurnames[Math.floor(Math.random() * maleSurnames.length)];
                const fullName = name + " " + surname;

                const container = document.getElementById('notification-container');
                const notification = document.createElement('div');
                notification.className = 'notification';
                notification.innerHTML = `<i class="fab fa-whatsapp" style="color: #25d366;"></i> <span><span class="notification-name">${fullName}</span> acabou de entrar no grupo!</span>`;

                container.appendChild(notification);

                setTimeout(() => {
                    notification.remove();
                }, 5500);
            }

            // Iniciar notificações aleatórias entre 1 e 5 segundos (Mais rápido)
            function scheduleNext() {
                const delay = 1000 + Math.random() * 4000;
                setTimeout(() => {
                    showJoinNotification();

                    // 30% de chance de aparecer um segundo pop-up junto
                    if (Math.random() < 0.3) {
                        setTimeout(showJoinNotification, 400);
                    }

                    scheduleNext();
                }, delay);
            }

            setTimeout(scheduleNext, 2000); // Começa após 2 segundos
        };
    </script>

</html>
