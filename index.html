<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Exclusivo | Grupo VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Slideshow com as suas fotos */
        .bg-slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: fadeSlide 28s infinite;
        }

        .slide:nth-child(1) {
            background-image: url('1.jpeg');
            animation-delay: 0s;
        }

        .slide:nth-child(2) {
            background-image: url('2.jpeg');
            animation-delay: 4s;
        }

        .slide:nth-child(3) {
            background-image: url('3.jpeg');
            animation-delay: 8s;
        }

        .slide:nth-child(4) {
            background-image: url('4.jpeg');
            animation-delay: 12s;
        }

        .slide:nth-child(5) {
            background-image: url('5.jpeg');
            animation-delay: 16s;
        }

        .slide:nth-child(6) {
            background-image: url('6.jpg');
            animation-delay: 20s;
        }

        .slide:nth-child(7) {
            background-image: url('7.jpg');
            animation-delay: 24s;
        }

        @keyframes fadeSlide {

            0%,
            100% {
                opacity: 0;
            }

            5%,
            14% {
                opacity: 1;
            }

            19% {
                opacity: 0;
            }
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.4) 100%);
            z-index: -1;
        }

        /* Contador Online no Topo */
        .online-header {
            position: fixed;
            top: 15px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .dot-live {
            width: 8px;
            height: 8px;
            background: #25d366;
            border-radius: 50%;
            box-shadow: 0 0 8px #25d366;
            animation: blinkLive 1.5s infinite;
        }

        @keyframes blinkLive {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .container {
            text-align: center;
            padding: 30px 20px;
            max-width: 400px;
            width: 90%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        .timer-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 25px;
            border: 2px solid #ff4d4d;
        }

        #countdown {
            font-size: 3rem;
            font-weight: 800;
            font-family: monospace;
            color: #fff;
        }

        .urgency-blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0.5;
                color: #ff0000;
            }
        }

        .btn-pulsar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #25d366;
            color: white;
            padding: 22px;
            font-size: 1.3rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 18px;
            transition: background-color 0.5s ease;
            animation: pulsar 1.5s infinite;
        }

        .btn-danger {
            background-color: #ff3333 !important;
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.6);
        }

        @keyframes pulsar {

            0%,
            100% {
                transform: scale(1);
            }

            70% {
                transform: scale(1.03);
            }
        }

        /* Pop-up de Prova Social (Apenas Masculino) */
        #social-proof {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: white;
            color: #333;
            padding: 10px 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform: translateX(-150%);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            width: 280px;
        }

        #social-proof.show {
            transform: translateX(0);
        }

        #social-proof img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #25d366;
        }

        .proof-info {
            font-size: 0.8rem;
            text-align: left;
        }

        .proof-info b {
            color: #128c7e;
            font-size: 0.9rem;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body>

    <div class="online-header">
        <div class="dot-live"></div>
        <span id="online-users">384</span> pessoas visualizando este convite
    </div>

    <div class="bg-slideshow">
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide)</div>
        <div class=" slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
    </div>
    <div class="bg-overlay"></div>

    <div class="container">
        <h1 style="font-size: 1.8rem; margin-bottom: 10px;">ÚLTIMAS VAGAS🔥</h1>

        <div class="timer-box">
            <div style="font-size: 0.8rem; color: #ff4d4d; font-weight: bold;">EXPIRA EM:</div>
            <div id="countdown">01:00</div>
        </div>

        <p style="margin-bottom: 25px;">O convite será invalidado quando o cronômetro zerar. Garanta sua vaga no grupo
            VIP.</p>

        <a href="SEU_LINK_AQUI" class="btn-pulsar" id="action-btn">
            <i class="fab fa-whatsapp"></i> ENTRAR NO GRUPO
        </a>

        <div class="footer-text">© 2026 • Acesso Privado e Seguro</div>
    </div>

    <div id="social-proof">
        <img src="" id="proof-img" alt="Avatar">
        <div class="proof-info">
            <b id="proof-name">Nome</b>
            <p>acabou de entrar no grupo</p>
        </div>
    </div>

    <script>
        // Função do Cronômetro
        function startTimer(duration, display, btn) {
            let timer = duration, minutes, seconds;
            let interval = setInterval(function () {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);
                display.textContent = (minutes < 10 ? "0" + minutes : minutes) + ":" + (seconds < 10 ? "0" + seconds : seconds);
                if (timer <= 30) display.classList.add('urgency-blink');
                if (timer <= 15) {
                    btn.classList.add('btn-danger');
                    btn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ENTRAR AGORA!';
                }
                if (--timer < 0) {
                    clearInterval(interval);
                    display.textContent = "00:00";
                    btn.style.opacity = "0.5";
                    btn.style.pointerEvents = "none";
                    btn.innerText = "CONVITE EXPIRADO";
                }
            }, 1000);
        }

        // Lógica do Contador Online
        let onlineCount = 384;
        setInterval(() => {
            onlineCount += Math.floor(Math.random() * 5) - 2;
            document.getElementById('online-users').innerText = onlineCount;
        }, 3500);

        // Lógica de Prova Social (Apenas Homens)
        const leads = [
            { n: "Ricardo Almeida", i: "https://xsgames.co/randomusers/assets/avatars/male/1.jpg" },
            { n: "Marcos Vinícius", i: "https://xsgames.co/randomusers/assets/avatars/male/2.jpg" },
            { n: "Thiago Soares", i: "https://xsgames.co/randomusers/assets/avatars/male/3.jpg" },
            { n: "Felipe Mendes", i: "https://xsgames.co/randomusers/assets/avatars/male/7.jpg" },
            { n: "Gustavo Rocha", i: "https://xsgames.co/randomusers/assets/avatars/male/5.jpg" },
            { n: "Lucas Oliveira", i: "https://xsgames.co/randomusers/assets/avatars/male/8.jpg" },
            { n: "Bruno Henrique", i: "https://xsgames.co/randomusers/assets/avatars/male/12.jpg" }
        ];

        function showProof() {
            const lead = leads[Math.floor(Math.random() * leads.length)];
            document.getElementById('proof-name').innerText = lead.n;
            document.getElementById('proof-img').src = lead.i;

            const popup = document.getElementById('social-proof');
            popup.classList.add('show');
            setTimeout(() => popup.classList.remove('show'), 4000);

            setTimeout(showProof, Math.floor(Math.random() * 7000) + 7000);
        }

        window.onload = function () {
            startTimer(60, document.querySelector('#countdown'), document.querySelector('#action-btn'));
            setTimeout(showProof, 3000);
        };
    </script>

</body>

</html>
